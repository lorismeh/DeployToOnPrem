name: '_Build OnPrem AL-Go project'

run-name: 'Build ${{ inputs.project }} (OnPrem)'

on:
  workflow_call:
    inputs:
      shell:
        description: Shell in which you want to run the action
        required: false
        default: powershell
        type: string
      runsOn:
        description: JSON-formatted string of the types of machine to run the build job on
        required: true
        type: string
      project:
        description: Name of the built project
        required: true
        type: string
      projectName:
        description: Friendly name of the built project
        required: true
        type: string
      buildMode:
        description: Build mode used when building the artifacts
        required: true
        type: string
      artifactsRetentionDays:
        description: Number of days to keep the artifacts
        type: number
        default: 7

permissions:
  actions: read
  contents: read

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  BuildOnPremProject:
    runs-on: ${{ fromJson(inputs.runsOn) }}
    defaults:
      run:
        shell: ${{ inputs.shell }}
    name: ${{ inputs.projectName }} (${{ inputs.buildMode }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read Settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}

      - name: Compile OnPrem AL App
        id: build
        run: |
          # Install BcContainerHelper
          Write-Host "Installing BcContainerHelper..."
          Install-Module -Name BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper
          
          # Read app.json
          $projectFolder = "${{ inputs.project }}"
          if ($projectFolder -eq ".") {
            $appJsonPath = "app.json"
            $projectFolderHost = $pwd.Path
          } else {
            $appJsonPath = Join-Path $projectFolder "app.json"
            $projectFolderHost = Resolve-Path $projectFolder
          }
          
          $appJson = Get-Content $appJsonPath -Raw | ConvertFrom-Json
          $appName = $appJson.name
          $appVersion = $appJson.version
          $bcVersionFull = $appJson.application
          $versionParts = $bcVersionFull.Split('.')
          $bcVersion = "$($versionParts[0]).$($versionParts[1])"
          
          Write-Host "Compiling: $appName v$appVersion (BC $bcVersion, Target: $($appJson.target))"
          
          # Get BC artifact URL (OnPrem)
          $artifactUrl = Get-BCArtifactUrl -type OnPrem -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            $artifactUrl = Get-BCArtifactUrl -type Sandbox -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          }
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            throw "Could not find BC artifacts for version $bcVersion"
          }
          
          # Output folder (AL-Go standard: .buildartifacts)
          $artifactFolder = Join-Path $projectFolderHost ".buildartifacts"
          $appsFolder = Join-Path $artifactFolder "Apps"
          if (Test-Path $artifactFolder) { Remove-Item $artifactFolder -Recurse -Force }
          New-Item -Path $appsFolder -ItemType Directory -Force | Out-Null
          
          # Container name
          $containerName = "bc-onprem-$env:GITHUB_RUN_ID" -replace '[^a-z0-9\-]', ''
          $credential = New-Object PSCredential 'admin', (ConvertTo-SecureString 'P@ss' -AsPlainText -Force)
          
          # Compile with Run-AlPipeline (bypasses Cloud-only analyzers)
          Run-AlPipeline `
            -pipelinename "OnPrem-Build" `
            -containerName $containerName `
            -artifact $artifactUrl `
            -auth NavUserPassword `
            -credential $credential `
            -memoryLimit 8G `
            -baseFolder $projectFolderHost `
            -appFolders @(".") `
            -testFolders @() `
            -doNotRunTests `
            -buildArtifactFolder $artifactFolder `
            -EnableCodeCop:$false `
            -EnableAppSourceCop:$false `
            -EnablePerTenantExtensionCop:$false `
            -EnableUICop:$false
          
          # Copy to standard location
          Get-ChildItem -Path $artifactFolder -Filter "*.app" -Recurse -File | ForEach-Object {
            if ($_.Directory.Name -ne "Apps") {
              Copy-Item $_.FullName -Destination $appsFolder -Force
            }
          }
          
          # DIAGNOSTIC: List what we actually have
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host " Build Output Verification" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Artifact folder: $artifactFolder"
          Write-Host "Apps folder: $appsFolder"
          Write-Host ""
          Write-Host "Contents of artifact folder (.buildartifacts):"
          if (Test-Path $artifactFolder) {
            Get-ChildItem -Path $artifactFolder -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName)"
            }
          } else {
            Write-Host "  [FOLDER DOES NOT EXIST!]" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "Contents of Apps folder (.buildartifacts/Apps):"
          if (Test-Path $appsFolder) {
            $appFilesFound = Get-ChildItem -Path $appsFolder -Filter "*.app" -File
            if ($appFilesFound.Count -gt 0) {
              Write-Host "  Found $($appFilesFound.Count) .app file(s):" -ForegroundColor Green
              $appFilesFound | ForEach-Object { Write-Host "    - $($_.Name)" -ForegroundColor Green }
            } else {
              Write-Host "  [NO .APP FILES FOUND!]" -ForegroundColor Red
            }
          } else {
            Write-Host "  [FOLDER DOES NOT EXIST!]" -ForegroundColor Red
          }
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host ""
          
          Write-Host "✓ Compilation complete. App files in .buildartifacts/Apps/"

      - name: Publish artifacts - apps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.projectName }}-Apps-${{ inputs.buildMode }}
          path: '${{ inputs.project }}/.buildartifacts/Apps/'
          if-no-files-found: error
          retention-days: ${{ inputs.artifactsRetentionDays }}
