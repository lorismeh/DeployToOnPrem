name: '_Build OnPrem AL-Go project'

run-name: 'Build ${{ inputs.project }} (OnPrem)'

on:
  workflow_call:
    inputs:
      shell:
        description: Shell in which you want to run the action
        required: false
        default: powershell
        type: string
      runsOn:
        description: JSON-formatted string of the types of machine to run the build job on
        required: true
        type: string
      project:
        description: Name of the built project
        required: true
        type: string
      projectName:
        description: Friendly name of the built project
        required: true
        type: string
      skippedProjectsJson:
        description: An array of AL-Go projects to skip in compressed JSON format
        required: false
        default: '[]'
        type: string
      projectDependenciesJson:
        description: Dependencies of the built project in compressed Json format
        required: false
        default: '{}'
        type: string
      buildMode:
        description: Build mode used when building the artifacts
        required: true
        type: string
      baselineWorkflowRunId:
        description: ID of the baseline workflow run, from where to download the current project dependencies, in case they are not built in the current workflow run
        required: false
        default: '0'
        type: string
      baselineWorkflowSHA:
        description: SHA of the baseline workflow run
        required: false
        default: ''
        type: string
      secrets:
        description: A comma-separated string with the names of the secrets, required for the workflow.
        required: false
        default: ''
        type: string
      artifactsRetentionDays:
        description: Number of days to keep the artifacts
        type: number
        default: 7
      artifactsNameSuffix:
        description: Suffix to add to the artifacts names
        required: false
        default: ''
        type: string
      signArtifacts:
        description: Flag indicating whether the apps should be signed
        type: boolean
        default: false
      useArtifactCache:
        description: Flag determining whether to use the Artifacts Cache
        type: boolean
        default: false
      needsContext:
        description: JSON formatted needs context
        type: string
        default: '{}'

permissions:
  actions: read
  contents: read
  id-token: write

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  BuildOnPremProject:
    needs: [ ]
    runs-on: ${{ fromJson(inputs.runsOn) }}
    defaults:
      run:
        shell: ${{ inputs.shell }}
    name: ${{ inputs.projectName }} (${{ inputs.buildMode }})
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.checkoutRef }}
          lfs: true

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          buildMode: ${{ inputs.buildMode }}
          get: useCompilerFolder,keyVaultCodesignCertificateName,doNotSignApps,doNotRunTests,doNotRunBcptTests,doNotRunpageScriptingTests,artifact,generateDependencyArtifact,trustedSigning,useGitSubmodules,trackALAlertsInGitHub

      - name: Determine whether to build project
        id: DetermineBuildProject
        uses: microsoft/AL-Go-Actions/DetermineBuildProject@v8.0
        with:
          shell: ${{ inputs.shell }}
          skippedProjectsJson: ${{ inputs.skippedProjectsJson }}
          project: ${{ inputs.project }}
          baselineWorkflowRunId: ${{ inputs.baselineWorkflowRunId }}

      - name: Read secrets
        id: ReadSecrets
        if: steps.DetermineBuildProject.outputs.BuildIt == 'True' && github.event_name != 'pull_request'
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.0
        with:
          shell: ${{ inputs.shell }}
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: '${{ inputs.secrets }},appDependencySecrets,AZURE_CREDENTIALS,-gitSubmodulesToken'

      - name: Checkout Submodules
        if: env.useGitSubmodules != 'false' && env.useGitSubmodules != ''
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.checkoutRef }}
          lfs: true
          submodules: ${{ env.useGitSubmodules }}
          token: '${{ fromJson(steps.ReadSecrets.outputs.Secrets).gitSubmodulesToken }}'

      - name: Determine ArtifactUrl
        id: determineArtifactUrl
        if: steps.DetermineBuildProject.outputs.BuildIt == 'True'
        uses: microsoft/AL-Go-Actions/DetermineArtifactUrl@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}

      - name: Cache Business Central Artifacts
        if: steps.DetermineBuildProject.outputs.BuildIt == 'True' && env.useCompilerFolder == 'True' && inputs.useArtifactCache && env.artifactCacheKey
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/.artifactcache
          key: ${{ env.artifactCacheKey }}

      - name: Download Project Dependencies
        id: DownloadProjectDependencies
        if: steps.DetermineBuildProject.outputs.BuildIt == 'True'
        uses: microsoft/AL-Go-Actions/DownloadProjectDependencies@v8.0
        env:
          Secrets: '${{ steps.ReadSecrets.outputs.Secrets }}'
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          buildMode: ${{ inputs.buildMode }}
          projectDependenciesJson: ${{ inputs.projectDependenciesJson }}
          baselineWorkflowRunId: ${{ inputs.baselineWorkflowRunId }}

      - name: Compile OnPrem AL App
        id: build
        run: |
          # Install BcContainerHelper
          Write-Host "Installing BcContainerHelper..."
          Install-Module -Name BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper
          
          # Read app.json
          $projectFolder = "${{ inputs.project }}"
          if ($projectFolder -eq ".") {
            $appJsonPath = "app.json"
            $projectFolderHost = $pwd.Path
          } else {
            $appJsonPath = Join-Path $projectFolder "app.json"
            $projectFolderHost = Resolve-Path $projectFolder
          }
          
          $appJson = Get-Content $appJsonPath -Raw | ConvertFrom-Json
          $appName = $appJson.name
          $appVersion = $appJson.version
          $bcVersionFull = $appJson.application
          $versionParts = $bcVersionFull.Split('.')
          $bcVersion = "$($versionParts[0]).$($versionParts[1])"
          
          Write-Host "Compiling: $appName v$appVersion (BC $bcVersion, Target: $($appJson.target))"
          
          # Get BC artifact URL (OnPrem)
          $artifactUrl = Get-BCArtifactUrl -type OnPrem -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            $artifactUrl = Get-BCArtifactUrl -type Sandbox -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          }
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            throw "Could not find BC artifacts for version $bcVersion"
          }
          
          # Output folder (AL-Go standard: .buildartifacts)
          $artifactFolder = Join-Path $projectFolderHost ".buildartifacts"
          $appsFolder = Join-Path $artifactFolder "Apps"
          if (Test-Path $artifactFolder) { Remove-Item $artifactFolder -Recurse -Force }
          New-Item -Path $appsFolder -ItemType Directory -Force | Out-Null
          
          # Build output log file (for AL-Go artifact upload)
          $buildOutputFile = Join-Path $projectFolderHost "BuildOutput.txt"
          
          # Container name
          $containerName = "bc-onprem-$env:GITHUB_RUN_ID" -replace '[^a-z0-9\-]', ''
          $credential = New-Object PSCredential 'admin', (ConvertTo-SecureString 'P@ss' -AsPlainText -Force)
          
          # Start transcript to capture build output (for AL-Go artifact)
          Start-Transcript -Path $buildOutputFile -Append
          
          try {
            # Compile with Run-AlPipeline (bypasses Cloud-only analyzers)
            # Note: Run-AlPipeline outputs .app files to buildArtifactFolder root
            # We need to move them to Apps subfolder for AL-Go compatibility
            Run-AlPipeline `
              -pipelinename "OnPrem-Build" `
              -containerName $containerName `
              -artifact $artifactUrl `
              -auth NavUserPassword `
              -credential $credential `
              -memoryLimit 8G `
              -baseFolder $projectFolderHost `
              -appFolders @("src") `
              -testFolders @() `
              -doNotRunTests `
              -buildArtifactFolder $artifactFolder `
              -doNotCleanupContainer:$false `
              -EnableCodeCop:$false `
              -EnableAppSourceCop:$false `
              -EnablePerTenantExtensionCop:$false `
              -EnableUICop:$false
            
            Write-Host "✓ Run-AlPipeline complete (container will be cleaned up automatically)"
          }
          finally {
            # Stop transcript to finalize build log
            Stop-Transcript
          }
          
          # Move .app files to Apps subfolder (AL-Go expects them there)
          Write-Host "Moving .app files to Apps folder..."
          $appsFound = Get-ChildItem -Path $artifactFolder -Filter "*.app" -File -ErrorAction SilentlyContinue
          if ($appsFound) {
            foreach ($app in $appsFound) {
              $destPath = Join-Path $appsFolder $app.Name
              Move-Item -Path $app.FullName -Destination $destPath -Force
              Write-Host "  Moved: $($app.Name) → Apps/" -ForegroundColor Cyan
            }
          }
          
          Write-Host "  Build log saved to: $buildOutputFile"
          
          # DIAGNOSTIC: Verify .app files are in the correct location for AL-Go
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host " Build Output Verification" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Project folder: $projectFolderHost"
          Write-Host "Artifact folder: $artifactFolder"
          Write-Host "Apps folder: $appsFolder"
          Write-Host ""
          
          # Check if Apps folder exists and contains .app files
          if (Test-Path $appsFolder) {
            $appFiles = Get-ChildItem -Path $appsFolder -Filter "*.app" -File
            if ($appFiles.Count -gt 0) {
              Write-Host "✓ SUCCESS: Found $($appFiles.Count) .app file(s) in Apps folder:" -ForegroundColor Green
              $appFiles | ForEach-Object { 
                $sizeKB = [math]::Round($_.Length/1KB, 2)
                Write-Host "  - $($_.Name) ($sizeKB KB)" -ForegroundColor Green 
              }
            } else {
              Write-Host "✗ ERROR: Apps folder exists but contains NO .app files!" -ForegroundColor Red
              Write-Host "  Checking if apps are elsewhere in artifact folder..." -ForegroundColor Yellow
              $appsElsewhere = Get-ChildItem -Path $artifactFolder -Filter "*.app" -Recurse -File
              if ($appsElsewhere.Count -gt 0) {
                Write-Host "  Found $($appsElsewhere.Count) .app file(s) in wrong location:" -ForegroundColor Yellow
                $appsElsewhere | ForEach-Object { Write-Host "    - $($_.FullName)" -ForegroundColor Yellow }
              }
            }
          } else {
            Write-Host "✗ ERROR: Apps folder does not exist!" -ForegroundColor Red
          }
          
          Write-Host ""
          Write-Host "Expected upload path: ${{ inputs.project }}/.buildartifacts/Apps/"
          Write-Host ""
          
          # Verify BuildOutput.txt exists
          if (Test-Path $buildOutputFile) {
            $logSizeKB = [math]::Round((Get-Item $buildOutputFile).Length/1KB, 2)
            Write-Host "✓ Build log created: BuildOutput.txt ($logSizeKB KB)" -ForegroundColor Green
          } else {
            Write-Host "⚠ Build log not found: BuildOutput.txt" -ForegroundColor Yellow
          }
          
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host ""
          
      - name: Sign
        id: sign
        if: steps.DetermineBuildProject.outputs.BuildIt == 'True' && inputs.signArtifacts && env.doNotSignApps == 'False' && (env.keyVaultCodesignCertificateName != '' || (fromJson(env.trustedSigning).Endpoint != '' && fromJson(env.trustedSigning).Account != '' && fromJson(env.trustedSigning).CertificateProfile != ''))
        uses: microsoft/AL-Go-Actions/Sign@v8.0
        with:
          shell: ${{ inputs.shell }}
          azureCredentialsJson: '${{ fromJson(steps.ReadSecrets.outputs.Secrets).AZURE_CREDENTIALS }}'
          pathToFiles: '${{ inputs.project }}/.buildartifacts/Apps/*.app'

      - name: Calculate Artifact names
        id: calculateArtifactsNames
        uses: microsoft/AL-Go-Actions/CalculateArtifactNames@v8.0
        if: success() || failure()
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          buildMode: ${{ inputs.buildMode }}
          suffix: ${{ inputs.artifactsNameSuffix }}

      - name: Publish artifacts - apps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && (hashFiles(format('{0}/.buildartifacts/Apps/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.AppsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/Apps/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Publish artifacts - dependencies
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && env.generateDependencyArtifact == 'True' && (hashFiles(format('{0}/.buildartifacts/Dependencies/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.DependenciesArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/Dependencies/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Publish artifacts - test apps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && (hashFiles(format('{0}/.buildartifacts/TestApps/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.TestAppsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/TestApps/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Publish artifacts - build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/BuildOutput.txt',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.BuildOutputArtifactsName }}
          path: '${{ inputs.project }}/BuildOutput.txt'
          if-no-files-found: ignore

      - name: Publish artifacts - container event log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (failure()) && (hashFiles(format('{0}/ContainerEventLog.evtx',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.ContainerEventLogArtifactsName }}
          path: '${{ inputs.project }}/ContainerEventLog.evtx'
          if-no-files-found: ignore

      - name: Publish artifacts - test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/.buildartifacts/TestResults.xml',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.TestResultsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/TestResults.xml'
          if-no-files-found: ignore

      - name: Publish artifacts - bcpt test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/.buildartifacts/bcptTestResults.json',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.BcptTestResultsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/bcptTestResults.json'
          if-no-files-found: ignore

      - name: Publish artifacts - page scripting test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/.buildartifacts/PageScriptingTestResults.xml',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.PageScriptingTestResultsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/PageScriptingTestResults.xml'
          if-no-files-found: ignore

      - name: Publish artifacts - page scripting test result details
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/.buildartifacts/PageScriptingTestResultDetails/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.PageScriptingTestResultDetailsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/PageScriptingTestResultDetails/'
          if-no-files-found: ignore

      - name: Publish artifacts - ErrorLogs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && (hashFiles(format('{0}/.buildartifacts/ErrorLogs/*',inputs.project)) != '') && env.trackALAlertsInGitHub == 'True'
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.ErrorLogsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/ErrorLogs/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Analyze Test Results
        id: analyzeTestResults
        if: (success() || failure()) && env.doNotRunTests == 'False'
        uses: microsoft/AL-Go-Actions/AnalyzeTests@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          testType: "normal"

      - name: Analyze BCPT Test Results
        id: analyzeTestResultsBCPT
        if: (success() || failure()) && env.doNotRunBcptTests == 'False'
        uses: microsoft/AL-Go-Actions/AnalyzeTests@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          testType: "bcpt"

      - name: Analyze Page Scripting Test Results
        id: analyzeTestResultsPageScripting
        if: (success() || failure()) && env.doNotRunpageScriptingTests == 'False'
        uses: microsoft/AL-Go-Actions/AnalyzeTests@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
          testType: "pageScripting"

      - name: Cleanup
        if: always() && steps.DetermineBuildProject.outputs.BuildIt == 'True'
        uses: microsoft/AL-Go-Actions/PipelineCleanup@v8.0
        with:
          shell: ${{ inputs.shell }}
          project: ${{ inputs.project }}
