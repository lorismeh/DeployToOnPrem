name: Build and Deploy to OnPrem (AL-Go Pattern)

# ========================================
# Optimized AL-Go Hybrid Workflow for OnPrem
# ========================================
# This workflow combines AL-Go's proven patterns with OnPrem-specific compilation.
#
# Architecture:
# 1. Initialization - AL-Go actions for settings, project detection, environment management
# 2. BuildOnPrem - Custom OnPrem compilation with BcContainerHelper (bypasses PTE0005 validation)
# 3. Deploy - AL-Go environment patterns with custom deployment script
# 4. PostProcess - AL-Go telemetry and workflow cleanup
#
# Why custom build is required:
# - AL-Go's BuildALGoProject enforces PTE0005/AS0053 validation
# - OnPrem target ("target": "OnPrem" in app.json) is not allowed in AL-Go's Cloud-focused pipeline
# - BcContainerHelper's Run-AlPipeline with disabled cops is the correct approach for OnPrem
#
# Optimizations:
# - Uses AL-Go ReadSettings action for consistent settings management
# - Consolidated build steps (removed redundant verification)
# - Standardized to .artifacts folder (AL-Go convention)
# - Streamlined deployment logging
# - Proper error handling throughout
# ========================================

on:
  push:
    branches: 
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Skip deployment (build only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  id-token: write

defaults:
  run:
    shell: pwsh

env:
  workflowDepth: 1
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  # ========================================
  # Job 1: Initialization (AL-Go Pattern)
  # ========================================
  # Leverages AL-Go actions for:
  # - Settings management
  # - Project detection
  # - Environment configuration
  # ========================================
  Initialization:
    name: Initialize OnPrem Workflow
    runs-on: windows-latest
    outputs:
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
      environmentsMatrixJson: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentsMatrixJson }}
      environmentCount: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentCount }}
      deploymentEnvironmentsJson: ${{ steps.DetermineDeploymentEnvironments.outputs.DeploymentEnvironmentsJson }}
      githubRunner: ${{ steps.ReadSettings.outputs.GitHubRunnerJson }}
      githubRunnerShell: ${{ steps.ReadSettings.outputs.GitHubRunnerShell }}
      projects: ${{ steps.determineProjectsToBuild.outputs.ProjectsJson }}
      projectDependenciesJson: ${{ steps.determineProjectsToBuild.outputs.ProjectDependenciesJson }}
      buildOrderJson: ${{ steps.determineProjectsToBuild.outputs.BuildOrderJson }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.0
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: powershell

      - name: Determine Projects To Build
        id: determineProjectsToBuild
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.0
        with:
          shell: powershell
          maxBuildDepth: ${{ env.workflowDepth }}

      - name: Determine Deployment Environments
        id: DetermineDeploymentEnvironments
        uses: microsoft/AL-Go-Actions/DetermineDeploymentEnvironments@v8.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          getEnvironments: '*'
          type: 'CD'

  # ========================================
  # Job 2: BuildOnPrem (Custom OnPrem Compilation)
  # ========================================
  # Uses AL-Go patterns but implements custom compilation:
  # - Respects AL-Go project matrix
  # - Uses BcContainerHelper for OnPrem artifacts
  # - Bypasses AL-Go's PTE0005 validation
  # - Follows AL-Go artifact naming conventions
  # ========================================
  BuildOnPrem:
    name: Build ${{ matrix.projectName }} (OnPrem)
    needs: [ Initialization ]
    if: (!failure()) && (!cancelled()) && fromJson(needs.Initialization.outputs.buildOrderJson)[0].projectsCount > 0
    strategy:
      matrix:
        include: ${{ fromJson(needs.Initialization.outputs.buildOrderJson)[0].buildDimensions }}
      fail-fast: false
    runs-on: ${{ fromJson(matrix.githubRunner) }}
    defaults:
      run:
        shell: ${{ matrix.githubRunnerShell }}
    outputs:
      appVersion: ${{ steps.build.outputs.appVersion }}
      appFileName: ${{ steps.build.outputs.appFileName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Read Settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: powershell
          project: ${{ matrix.project }}

      - name: Compile OnPrem AL App
        id: build
        run: |
          # Install BcContainerHelper
          Write-Host "Installing BcContainerHelper..."
          Install-Module -Name BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper
          
          # Read app.json for project-specific settings
          $projectFolder = "${{ matrix.project }}"
          if ($projectFolder -eq ".") {
            $appJsonPath = "app.json"
            $projectFolderHost = $pwd.Path
          } else {
            $appJsonPath = Join-Path $projectFolder "app.json"
            $projectFolderHost = Resolve-Path $projectFolder
          }
          
          $appJson = Get-Content $appJsonPath -Raw | ConvertFrom-Json
          $appName = $appJson.name
          $appVersion = $appJson.version
          $bcVersionFull = $appJson.application
          
          # Extract major.minor version for artifact lookup
          $versionParts = $bcVersionFull.Split('.')
          $bcVersion = "$($versionParts[0]).$($versionParts[1])"
          
          Write-Host "========================================="
          Write-Host "  Compiling OnPrem AL Application"
          Write-Host "========================================="
          Write-Host "Project: ${{ matrix.projectName }}"
          Write-Host "App: $appName v$appVersion"
          Write-Host "BC Version: $bcVersionFull"
          Write-Host "Target: $($appJson.target)"
          Write-Host "Project Folder: $projectFolderHost"
          Write-Host ""
          
          # Get BC artifact URL
          Write-Host "Searching for OnPrem artifacts (BC $bcVersion)..."
          $artifactUrl = Get-BCArtifactUrl -type OnPrem -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            Write-Host "OnPrem artifacts not found, trying Sandbox artifacts..."
            $artifactUrl = Get-BCArtifactUrl -type Sandbox -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          }
          
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            throw "Could not find BC artifacts for version $bcVersion"
          }
          
          Write-Host "✓ Found artifact: $artifactUrl"
          Write-Host ""
          
          # Output folder (AL-Go standard: .artifacts)
          # Use absolute path for Run-AlPipeline compatibility
          $artifactFolderRelative = ".artifacts"
          $artifactFolder = Join-Path $pwd.Path $artifactFolderRelative
          
          if (Test-Path $artifactFolder) { Remove-Item $artifactFolder -Recurse -Force }
          New-Item -Path $artifactFolder -ItemType Directory | Out-Null
          
          Write-Host "Artifact output folder: $artifactFolder"
          Write-Host ""
          
          # Generate unique container name (AL-Go pattern)
          $containerName = "bc${{ matrix.projectName }}-$env:GITHUB_RUN_ID".ToLower() -replace '[^a-z0-9\-]', ''
          Write-Host "Container: $containerName"
          
          # Create credential for container
          $credential = New-Object PSCredential -ArgumentList 'admin', (ConvertTo-SecureString -String 'P@ss' -AsPlainText -Force)
          
          # Run AL compilation pipeline (bypasses AL-Go's PTE0005 validation for OnPrem target)
          Write-Host "Running AL compilation pipeline..."
          Write-Host ""
          
          try {
            Run-AlPipeline `
              -pipelinename "OnPrem-CICD" `
              -containerName $containerName `
              -artifact $artifactUrl `
              -auth NavUserPassword `
              -credential $credential `
              -memoryLimit 8G `
              -baseFolder $projectFolderHost `
              -sharedFolder "" `
              -appFolders @(".") `
              -testFolders @() `
              -doNotRunTests `
              -doNotPublishApps `
              -installApps @() `
              -installTestApps @() `
              -buildArtifactFolder $artifactFolder `
              -EnableCodeCop:$false `
              -EnableAppSourceCop:$false `
              -EnablePerTenantExtensionCop:$false `
              -EnableUICop:$false
              
            Write-Host ""
            Write-Host "✓ Compilation successful!"
            Write-Host ""
            
            # Diagnostic: Show artifact folder structure
            Write-Host "Checking artifact folder structure..."
            Write-Host "Artifact folder: $artifactFolder"
            
            if (Test-Path $artifactFolder) {
              Write-Host "Contents of $artifactFolder :"
              Get-ChildItem -Path $artifactFolder -Recurse | ForEach-Object {
                Write-Host "  $($_.FullName) ($($_.Length) bytes)"
              }
            } else {
              Write-Host "WARNING: Artifact folder does not exist!"
            }
            Write-Host ""
            
            # Verify and organize compiled apps (search recursively)
            $appFiles = Get-ChildItem -Path $artifactFolder -Filter "*.app" -Recurse -File
            
            if ($appFiles.Count -eq 0) {
              throw "No .app files were created by Run-AlPipeline in $artifactFolder"
            }
            
            Write-Host "Found $($appFiles.Count) compiled .app file(s):"
            $appFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
            
            # AL-Go artifact naming convention: appName_appVersion.app
            $appFileNameSafe = "${appName}_${appVersion}.app" -replace '[\\/:*?"<>|]', '_'
            $targetPath = Join-Path $artifactFolder $appFileNameSafe
            
            # Get main app file (exclude test apps)
            $mainAppFile = $appFiles | Where-Object { $_.Name -notmatch '^Test_' } | Select-Object -First 1
            if (-not $mainAppFile) { $mainAppFile = $appFiles[0] }
            
            # Copy to root of .artifacts if in subdirectory
            if ($mainAppFile.FullName -ne $targetPath) {
              Copy-Item -Path $mainAppFile.FullName -Destination $targetPath -Force
            }
            
            Write-Host ""
            Write-Host "✓ App ready: $appFileNameSafe"
            Write-Host ""
            
            # Final verification before upload
            Write-Host "Final verification of artifacts for upload:"
            Get-ChildItem -Path $artifactFolderRelative -Recurse -File | ForEach-Object {
              Write-Host "  ✓ $($_.FullName) ($($_.Length) bytes)"
            }
          }
          catch {
            Write-Host ""
            Write-Host "❌ Compilation failed: $_" -ForegroundColor Red
            Write-Host "Stack trace: $($_.ScriptStackTrace)" -ForegroundColor Red
            throw
          }
          
          # Output job results
          echo "appVersion=$appVersion" >> $env:GITHUB_OUTPUT
          echo "appFileName=$appFileNameSafe" >> $env:GITHUB_OUTPUT

      - name: Upload Build Artifacts #TODO
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && (hashFiles(format('{0}/.buildartifacts/Apps/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.AppsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/Apps/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}
          
       - name: Publish artifacts - dependencies
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && env.generateDependencyArtifact == 'True' && (hashFiles(format('{0}/.buildartifacts/Dependencies/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.DependenciesArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/Dependencies/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Publish artifacts - test apps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: inputs.artifactsRetentionDays >= 0 && (hashFiles(format('{0}/.buildartifacts/TestApps/*',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.TestAppsArtifactsName }}
          path: '${{ inputs.project }}/.buildartifacts/TestApps/'
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifactsRetentionDays }}

      - name: Publish artifacts - build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: (success() || failure()) && (hashFiles(format('{0}/BuildOutput.txt',inputs.project)) != '')
        with:
          name: ${{ steps.calculateArtifactsNames.outputs.BuildOutputArtifactsName }}
          path: '${{ inputs.project }}/BuildOutput.txt'
          if-no-files-found: ignore

  # ========================================
  # Job 3: Deploy (AL-Go Environment Pattern)
  # ========================================
  # Uses AL-Go patterns for deployment:
  # - Environment matrix from AL-Go configuration
  # - Environment protection rules
  # - Existing DeployToOnPrem.ps1 script
  # ========================================
  Deploy:
    name: Deploy to ${{ matrix.environment }}
    needs: [ Initialization, BuildOnPrem ]
    if: (!cancelled()) && (needs.BuildOnPrem.result == 'success' || needs.BuildOnPrem.result == 'skipped') && needs.Initialization.outputs.environmentCount > 0 && !inputs.skipDeploy
    strategy: ${{ fromJson(needs.Initialization.outputs.environmentsMatrixJson) }}
    runs-on: ${{ fromJson(matrix.os) }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    environment:
      name: ${{ matrix.environment }}
    env:
      ALGoEnvSettings: ${{ vars.ALGoEnvironmentSettings }}
      ALGoEnvName: ${{ matrix.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: .artifacts

      - name: EnvName
        id: envName
        run: |
          $envName = '${{ matrix.environment }}'.split(' ')[0]
          echo "envName=$envName" >> $env:GITHUB_OUTPUT

      - name: Read Secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.0
        with:
          shell: ${{ matrix.shell }}
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: '${{ steps.envName.outputs.envName }}-AuthContext,${{ steps.envName.outputs.envName }}_AuthContext,AuthContext'

      - name: Deploy to Business Central OnPrem
        env:
          Secrets: '${{ steps.ReadSecrets.outputs.Secrets }}'
        run: |
          Write-Host "========================================="
          Write-Host "  Deploying to BC OnPrem Server"
          Write-Host "  Environment: ${{ matrix.environment }}"
          Write-Host "========================================="
          Write-Host ""
          
          # Parse secrets (AL-Go pattern)
          $secrets = $env:Secrets | ConvertFrom-Json
          $authContextJson = $secrets.AuthContext
          
          if (-not $authContextJson) {
            throw "AuthContext secret not found for environment ${{ matrix.environment }}"
          }
          
          # Get all app files from artifacts
          $appFiles = Get-ChildItem -Path ".artifacts" -Filter "*.app" -File -Recurse
          
          if ($appFiles.Count -eq 0) {
            throw "No app files found in artifacts folder"
          }
          
          Write-Host "Found $($appFiles.Count) app file(s) to deploy:"
          $appFiles | ForEach-Object { Write-Host "  - $($_.Name)" }
          Write-Host ""
          
          # Prepare deployment parameters (AL-Go convention)
          $deploymentParams = @{
            type = "CD"
            apps = $appFiles.FullName
            EnvironmentType = "OnPrem"
            EnvironmentName = "${{ matrix.environment }}"
            AuthContext = $authContextJson
          }
          
          # Execute deployment script
          . ".github/DeployToOnPrem.ps1" -parameters $deploymentParams
          
          Write-Host ""
          Write-Host "✓ Deployment completed successfully!" -ForegroundColor Green

      - name: Deployment Summary
        if: always()
        run: |
          $appVersion = "${{ needs.BuildOnPrem.outputs.appVersion }}"
          $appFileName = "${{ needs.BuildOnPrem.outputs.appFileName }}"
          
          Write-Host "========================================="
          Write-Host "  DEPLOYMENT SUMMARY"
          Write-Host "========================================="
          Write-Host "App: $appFileName"
          Write-Host "Version: $appVersion"
          Write-Host "Environment: ${{ matrix.environment }}"
          Write-Host "Status: ${{ job.status }}"
          Write-Host "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "========================================="

  # ========================================
  # Job 4: PostProcess (AL-Go Pattern)
  # ========================================
  # Optional: Telemetry and workflow cleanup
  # ========================================
  PostProcess:
    needs: [ Initialization, BuildOnPrem, Deploy ]
    if: (!cancelled())
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Finalize the workflow
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.Initialization.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
