name: Build and Deploy to OnPrem

on:
  push:
    branches: 
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.AL-Go/**'
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Skip deployment (build only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

defaults:
  run:
    shell: pwsh

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  BuildOnPrem:
    name: Build OnPrem App
    runs-on: windows-latest
    
    outputs:
      appVersion: ${{ steps.build.outputs.appVersion }}
      appFileName: ${{ steps.build.outputs.appFileName }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app.json
        id: readAppJson
        run: |
          $appJson = Get-Content "app.json" -Raw | ConvertFrom-Json
          $appName = $appJson.name
          $appVersion = $appJson.version
          $appPublisher = $appJson.publisher
          
          Write-Host "App Name: $appName"
          Write-Host "App Version: $appVersion"
          Write-Host "App Publisher: $appPublisher"
          
          echo "appName=$appName" >> $env:GITHUB_OUTPUT
          echo "appVersion=$appVersion" >> $env:GITHUB_OUTPUT
          echo "appPublisher=$appPublisher" >> $env:GITHUB_OUTPUT

      - name: Download Business Central Artifacts
        id: downloadArtifacts
        run: |
          # Install BcContainerHelper
          Write-Host "Installing BcContainerHelper..."
          Install-Module -Name BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper
          
          # Get artifact URL from app.json application version
          $appJson = Get-Content "app.json" -Raw | ConvertFrom-Json
          $bcVersionFull = $appJson.application
          Write-Host "BC Application Version from app.json: $bcVersionFull"
          
          # Extract major version (e.g., "25.0.0.0" -> "25.0")
          $versionParts = $bcVersionFull.Split('.')
          $bcVersion = "$($versionParts[0]).$($versionParts[1])"
          Write-Host "BC Version for artifact lookup: $bcVersion"
          
          # Try to get OnPrem artifact URL
          Write-Host "Searching for OnPrem artifacts..."
          $artifactUrl = Get-BCArtifactUrl -type OnPrem -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          
          # If OnPrem not found, try Sandbox (same artifacts, different storage)
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            Write-Host "OnPrem artifacts not found, trying Sandbox artifacts..."
            $artifactUrl = Get-BCArtifactUrl -type Sandbox -version $bcVersion -country "w1" -select Latest -accept_insiderEula
          }
          
          if ([string]::IsNullOrEmpty($artifactUrl)) {
            throw "Could not find BC artifacts for version $bcVersion. Available versions: $(Get-BCArtifactUrl -select All -type Sandbox -country w1 | Select-Object -First 5)"
          }
          
          Write-Host "✓ Found artifact URL: $artifactUrl"
          
          
          echo "artifactUrl=$artifactUrl" >> $env:GITHUB_OUTPUT

      - name: Compile AL App
        id: build
        run: |
          Import-Module BcContainerHelper
          
          $artifactUrl = "${{ steps.downloadArtifacts.outputs.artifactUrl }}"
          $appJson = Get-Content "app.json" -Raw | ConvertFrom-Json
          
          Write-Host "========================================="
          Write-Host "  Compiling AL Application"
          Write-Host "========================================="
          Write-Host "App: $($appJson.name)"
          Write-Host "Version: $($appJson.version)"
          Write-Host "Publisher: $($appJson.publisher)"
          Write-Host "Artifact: $artifactUrl"
          Write-Host ""
          
          # Output folder for compiled app
          $outputFolder = ".output"
          if (Test-Path $outputFolder) { Remove-Item $outputFolder -Recurse -Force }
          New-Item -Path $outputFolder -ItemType Directory | Out-Null
          
          # App file name
          $appName = $appJson.name
          $appVersion = $appJson.version
          $appFileName = "${appName}_${appVersion}.app"
          $outputPath = Join-Path (Resolve-Path $outputFolder) $appFileName
          
          Write-Host "Output path: $outputPath"
          Write-Host ""
          
          # Use BcContainerHelper's Compile-AppInBcContainer which handles artifact extraction
          Write-Host "Compiling using BcContainerHelper..."
          try {
            # Compile without container using artifact URL directly
            Compile-AppWithBcCompilerFolder `
              -appProjectFolder "." `
              -appOutputFolder $outputFolder `
              -appSymbolsFolder ".alpackages" `
              -ArtifactUrl $artifactUrl `
              -EnableCodeCop:$false `
              -EnableAppSourceCop:$false `
              -EnablePerTenantExtensionCop:$false `
              -EnableUICop:$false `
              -UpdateSymbols
              
            Write-Host ""
            Write-Host "✓ Compilation successful!"
            
            # Rename output file to expected name (BcContainerHelper might use different naming)
            $compiledApp = Get-ChildItem -Path $outputFolder -Filter "*.app" | Select-Object -First 1
            if ($compiledApp) {
              if ($compiledApp.Name -ne $appFileName) {
                Write-Host "Renaming $($compiledApp.Name) to $appFileName"
                Rename-Item -Path $compiledApp.FullName -NewName $appFileName
              }
              Write-Host "App file: $appFileName"
            }
            else {
              throw "No .app file was created in output folder"
            }
          }
          catch {
            Write-Host "Error during compilation: $_" -ForegroundColor Red
            Write-Host "Stack trace: $($_.ScriptStackTrace)" -ForegroundColor Red
            throw
          }
          
          echo "appVersion=$appVersion" >> $env:GITHUB_OUTPUT
          echo "appFileName=$appFileName" >> $env:GITHUB_OUTPUT
          echo "outputPath=$outputPath" >> $env:GITHUB_OUTPUT

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Apps
          path: .output/*.app
          retention-days: 7
          if-no-files-found: error

      - name: Upload to Release (Optional)
        if: success()
        run: |
          $appVersion = "${{ steps.build.outputs.appVersion }}"
          $tagName = "v$appVersion"
          
          Write-Host "Build completed successfully for version $appVersion"
          Write-Host "To create a release, manually create tag: $tagName"

  DeployOnPrem:
    name: Deploy to OnPrem Server
    needs: BuildOnPrem
    if: ${{ !inputs.skipDeploy }}
    runs-on: [self-hosted, bc-onprem]  # Use your on-premise runner
    environment:
      name: BCOnPremTest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Apps
          path: ./.artifacts

      - name: Read Deployment Settings
        id: settings
        run: |
          # Read AL-Go settings for deployment configuration
          $settings = Get-Content ".github/AL-Go-Settings.json" -Raw | ConvertFrom-Json
          
          # Get environment-specific settings
          $envSettings = $settings.DeployToBCOnPremTest
          
          Write-Host "Environment Type: $($envSettings.EnvironmentType)"
          Write-Host "Environment Name: $($envSettings.EnvironmentName)"
          
          echo "environmentType=$($envSettings.EnvironmentType)" >> $env:GITHUB_OUTPUT
          echo "environmentName=$($envSettings.EnvironmentName)" >> $env:GITHUB_OUTPUT

      - name: Deploy to Business Central OnPrem
        env:
          AUTH_CONTEXT: ${{ secrets.BCOnPremTest_AuthContext }}
        run: |
          Write-Host "========================================="
          Write-Host "  Deploying to BC OnPrem Server"
          Write-Host "========================================="
          
          # Parse AuthContext from environment variable (GitHub secret)
          $authContextJson = $env:AUTH_CONTEXT
          if (-not $authContextJson) {
            throw "AuthContext secret not found. Please configure BCOnPremTest_AuthContext secret."
          }
          
          # Get app files
          $appFiles = Get-ChildItem -Path "./.artifacts" -Filter "*.app" -File
          
          if ($appFiles.Count -eq 0) {
            throw "No app files found in artifacts folder"
          }
          
          Write-Host "Apps to deploy:"
          $appFiles | ForEach-Object { Write-Host "  - $($_.Name)" }
          Write-Host ""
          
          # Prepare parameters for DeployToOnPrem.ps1
          # The script expects 'AuthContext' (not AUTH_CONTEXT) as a JSON string
          $deploymentParams = @{
            type = "CD"  # Continuous Deployment
            apps = $appFiles.FullName
            EnvironmentType = "${{ steps.settings.outputs.environmentType }}"
            EnvironmentName = "${{ steps.settings.outputs.environmentName }}"
            AuthContext = $authContextJson
          }
          
          # Execute deployment script
          Write-Host "Executing deployment script..."
          Write-Host ""
          . "./.github/DeployToOnPrem.ps1" -parameters $deploymentParams
          
          Write-Host ""
          Write-Host "✓ Deployment completed successfully!"

      - name: Deployment Summary
        if: always()
        run: |
          $appVersion = "${{ needs.BuildOnPrem.outputs.appVersion }}"
          $appFileName = "${{ needs.BuildOnPrem.outputs.appFileName }}"
          
          if ($env:RUNNER_STATUS -eq 'success') {
            Write-Host "========================================="
            Write-Host "  DEPLOYMENT SUCCESSFUL"
            Write-Host "========================================="
            Write-Host "App: $appFileName"
            Write-Host "Version: $appVersion"
            Write-Host "Environment: BCOnPremTest"
            Write-Host "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
            Write-Host "========================================="
          } else {
            Write-Host "Deployment encountered issues. Check logs above."
          }
