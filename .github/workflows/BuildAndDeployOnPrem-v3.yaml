name: Build and Deploy to OnPrem

on:
  push:
    branches: 
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Skip deployment (build only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  id-token: write

defaults:
  run:
    shell: pwsh

env:
  workflowDepth: 1
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  # ========================================
  # Initialization - Pure AL-Go
  # ========================================
  Initialization:
    name: Initialize
    runs-on: windows-latest
    outputs:
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
      environmentsMatrixJson: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentsMatrixJson }}
      environmentCount: ${{ steps.DetermineDeploymentEnvironments.outputs.EnvironmentCount }}
      deploymentEnvironmentsJson: ${{ steps.DetermineDeploymentEnvironments.outputs.DeploymentEnvironmentsJson }}
      githubRunner: ${{ steps.ReadSettings.outputs.GitHubRunnerJson }}
      githubRunnerShell: ${{ steps.ReadSettings.outputs.GitHubRunnerShell }}
      projects: ${{ steps.determineProjectsToBuild.outputs.ProjectsJson }}
      projectDependenciesJson: ${{ steps.determineProjectsToBuild.outputs.ProjectDependenciesJson }}
      buildOrderJson: ${{ steps.determineProjectsToBuild.outputs.BuildOrderJson }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.0
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: powershell

      - name: Determine Projects To Build
        id: determineProjectsToBuild
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.0
        with:
          shell: powershell
          maxBuildDepth: ${{ env.workflowDepth }}

      - name: Determine Deployment Environments
        id: DetermineDeploymentEnvironments
        uses: microsoft/AL-Go-Actions/DetermineDeploymentEnvironments@v8.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          getEnvironments: '*'
          type: 'CD'

  # ========================================
  # Build - Custom OnPrem Workflow
  # ========================================
  Build:
    needs: [ Initialization ]
    if: (!failure()) && (!cancelled()) && fromJson(needs.Initialization.outputs.buildOrderJson)[0].projectsCount > 0
    strategy:
      matrix:
        include: ${{ fromJson(needs.Initialization.outputs.buildOrderJson)[0].buildDimensions }}
      fail-fast: false
    name: Build ${{ matrix.projectName }} (OnPrem)
    uses: ./.github/workflows/_BuildOnPremProject.yaml
    with:
      shell: ${{ matrix.githubRunnerShell }}
      runsOn: ${{ matrix.githubRunner }}
      project: ${{ matrix.project }}
      projectName: ${{ matrix.projectName }}
      buildMode: ${{ matrix.buildMode }}
      artifactsRetentionDays: 7

  # ========================================
  # Deploy - Pure AL-Go Pattern
  # ========================================
  Deploy:
    name: Deploy to ${{ matrix.environment }}
    needs: [ Initialization, Build ]
    if: (!cancelled()) && (needs.Build.result == 'success') && needs.Initialization.outputs.environmentCount > 0 && !inputs.skipDeploy
    strategy: ${{ fromJson(needs.Initialization.outputs.environmentsMatrixJson) }}
    runs-on: ${{ fromJson(matrix.os) }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    environment:
      name: ${{ matrix.environment }}
    env:
      ALGoEnvSettings: ${{ vars.ALGoEnvironmentSettings }}
      ALGoEnvName: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.0
        with:
          shell: ${{ matrix.shell }}

      - name: Download Build Artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: .artifacts

      - name: EnvName
        id: envName
        run: |
          $envName = '${{ matrix.environment }}'.split(' ')[0]
          echo "envName=$envName" >> $env:GITHUB_OUTPUT

      - name: Read Secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.0
        with:
          shell: ${{ matrix.shell }}
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: '${{ steps.envName.outputs.envName }}-AuthContext,${{ steps.envName.outputs.envName }}_AuthContext,AuthContext'

      - name: Deploy to Business Central OnPrem
        env:
          Secrets: '${{ steps.ReadSecrets.outputs.Secrets }}'
        run: |
          $secrets = $env:Secrets | ConvertFrom-Json
          $authContextJson = $secrets.AuthContext
          
          if (-not $authContextJson) {
            throw "AuthContext secret not found for environment ${{ matrix.environment }}"
          }
          
          $appFiles = Get-ChildItem -Path ".artifacts" -Filter "*.app" -File -Recurse
          if ($appFiles.Count -eq 0) {
            throw "No app files found in artifacts folder"
          }
          
          Write-Host "Deploying $($appFiles.Count) app file(s) to ${{ matrix.environment }}"
          
          $deploymentParams = @{
            type = "CD"
            apps = $appFiles.FullName
            EnvironmentType = "OnPrem"
            EnvironmentName = "${{ matrix.environment }}"
            AuthContext = $authContextJson
          }
          
          . ".github/DeployToOnPrem.ps1" -parameters $deploymentParams
          
          Write-Host "✓ Deployment completed successfully!"

  # ========================================
  # PostProcess - Pure AL-Go
  # ========================================
  PostProcess:
    needs: [ Initialization, Build, Deploy ]
    if: (!cancelled())
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Finalize the workflow
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.Initialization.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
